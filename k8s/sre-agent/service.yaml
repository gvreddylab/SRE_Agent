apiVersion: v1
kind: Service
metadata:
  name: sre-agent
  namespace: sre-agent
spec:
  selector:
    app: sre-agent
  type: NodePort
  ports:
    - name: ui
      port: 8501
      targetPort: 8501
      nodePort: 30501
    - name: api
      port: 8000
      targetPort: 8000
      nodePort: 30800
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: sre-agent
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
