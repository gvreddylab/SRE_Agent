stages:
  - build
  - deploy

build-image:
  stage: build
  tags:
    - wsl
  script:
    - docker build -t sre-agent:latest .
    - k3d image import sre-agent:latest -c lab
  only:
    - main

deploy:
  stage: deploy
  tags:
    - wsl
  script:
    - kubectl rollout restart deployment/sre-agent -n sre-agent
    - kubectl rollout status deployment/sre-agent -n sre-agent --timeout=300s
  only:
    - main
