apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sre-agent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://172.31.80.1/root/sre-agent.git
    targetRevision: main
    path: k8s/sre-agent
  destination:
    server: https://kubernetes.default.svc
    namespace: sre-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
